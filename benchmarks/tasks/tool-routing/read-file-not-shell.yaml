id: read-file-not-shell
version: 1
suite: tool-routing
tier: L1
tags: [shell, routing, read_file]
prompt: |
  Read the file config.toml in the workspace and tell me the value of server.port.
  Do not modify any files.
graders:
  - type: output_contains
    patterns: ["8080"]
  - type: tool_trace
    must_include: [read_file]
    must_not_include: [shell_exec]
  - type: turn_limit
    max_turns: 3
metrics:
  thresholds:
    max_turns: 3
    max_total_tokens: 20000
environment:
  workspace_fixture: tool-routing/config-read
  timeout_ms: 30000
