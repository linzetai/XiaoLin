[package]
name = "xiaolin-network-proxy"
version.workspace = true
edition.workspace = true
description = "Network proxy configuration and policy types for XiaoLin"

[dependencies]
anyhow = "1"
async-trait = "0.1"
bytes = "1"
dirs = "6"
globset = "0.4"
http = "1"
http-body-util = "0.1"
hyper = { version = "1", features = ["http1", "server", "client"] }
hyper-util = { version = "0.1", features = ["tokio", "http1", "client-legacy"] }
rcgen = { version = "0.13", features = ["pem", "x509-parser"] }
rustls = { version = "0.23", features = ["ring"] }
rustls-pemfile = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
url = "2"
tokio = { version = "1", features = ["sync", "net", "rt", "io-util"] }
tokio-rustls = "0.26"
webpki-roots = "0.26"

[dev-dependencies]
serde_json = "1"
tempfile = "3"
tokio = { version = "1", features = ["sync", "net", "rt", "macros", "io-util"] }
