# XiaoLin Execution Policy Configuration
# Place at: .xiaolin/exec-policy.toml (project) or ~/.xiaolin/exec-policy.toml (user)

[defaults]
# Commands that are always safe to run without confirmation.
allow_readonly = [
    "ls", "cat", "head", "tail", "wc", "grep", "find", "which", "whoami",
    "pwd", "date", "echo", "printf", "test", "true", "false",
    "git", "cargo", "npm", "node", "python3", "rustc",
]
fallback = "prompt"

# ── Forbidden Operations ─────────────────────────────────────────────

[[rules]]
id = "forbid-sudo"
pattern = ["sudo"]
decision = "forbidden"
justification = "Agent must not escalate to root privileges"

[[rules]]
id = "forbid-force-push"
pattern = ["git", "push", "--force"]
decision = "forbidden"
justification = "Force push rewrites history and can cause data loss"

[[rules]]
id = "forbid-rm-rf-root"
pattern = ["rm", "-rf", "/"]
decision = "forbidden"
justification = "Would destroy the entire file system"

# ── Prompt Operations ────────────────────────────────────────────────

[[rules]]
id = "prompt-git-push"
pattern = ["git", "push"]
decision = "prompt"
justification = "Push sends code to remote; confirm intent"

[[rules]]
id = "prompt-destructive-git"
pattern = ["git", ["reset", "rebase", "cherry-pick"]]
decision = "prompt"
justification = "These operations can rewrite history"

[[rules]]
id = "prompt-npm-publish"
pattern = ["npm", "publish"]
decision = "prompt"
justification = "Publishing is irreversible"

# ── Network Rules ────────────────────────────────────────────────────

[[network]]
id = "allow-github"
host = "api.github.com"
protocol = "https"
decision = "allow"

[[network]]
id = "allow-npm-registry"
host = "registry.npmjs.org"
protocol = "https"
decision = "allow"

[[network]]
id = "allow-crates-io"
host = "crates.io"
protocol = "https"
decision = "allow"

# ── Validation Tests ─────────────────────────────────────────────────

[[tests]]
command = "ls -la"
expect = "allow"

[[tests]]
command = "git status"
expect = "allow"

[[tests]]
command = "sudo rm -rf /"
expect = "forbidden"

[[tests]]
command = "git push --force origin main"
expect = "forbidden"

[[tests]]
command = "git push origin main"
expect = "prompt"

[[tests]]
command = "npm publish"
expect = "prompt"
