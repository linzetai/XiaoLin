[package]
name = "xiaolin-pty"
version = "0.1.0"
edition = "2021"
description = "PTY session management for XiaoLin interactive terminal"

[dependencies]
portable-pty = "0.8"
tokio = { version = "1", features = ["sync", "time", "io-util", "rt"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
parking_lot = "0.12"
