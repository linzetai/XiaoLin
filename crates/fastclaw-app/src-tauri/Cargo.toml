[package]
name = "fastclaw-app"
version = "0.1.0"
edition = "2021"
description = "FastClaw Desktop App — AI Agent IM"
default-run = "fastclaw-app"

[lib]
name = "fastclaw_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "fastclaw-app"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-global-shortcut = "2"
tauri-plugin-notification = "2"
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
anyhow = "1"
tracing = { workspace = true }

reqwest = { workspace = true }

uuid = { workspace = true }
dirs = { workspace = true }
json5 = { workspace = true }
chrono = { workspace = true }

fastclaw-core = { path = "../../fastclaw-core" }
fastclaw-gateway = { path = "../../fastclaw-gateway" }
fastclaw-agent = { path = "../../fastclaw-agent" }
fastclaw-observe = { path = "../../fastclaw-observe" }
tauri-plugin-dialog = "2"
tauri-plugin-mcp-bridge = "0.11"
zip = { version = "8.5.1", default-features = false, features = ["deflate"] }

[dev-dependencies]
fastclaw-gateway = { path = "../../fastclaw-gateway", features = ["test-helpers"] }
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
async-trait = "0.1"
futures = "0.3"
