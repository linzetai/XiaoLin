[package]
name = "fastclaw-app"
version = "0.0.6"
edition = "2021"
description = "FastClaw Desktop App — AI Agent IM"
default-run = "fastclaw-app"

[lib]
name = "fastclaw_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "fastclaw-app"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api", "tray-icon"] }
tauri-plugin-global-shortcut = "2"
tauri-plugin-notification = "2"
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
anyhow = "1"
tracing = { workspace = true }

reqwest = { workspace = true }

uuid = { workspace = true }
dirs = { workspace = true }
json5 = { workspace = true }
chrono = { workspace = true }

cron = "0.12"

fastclaw-core = { path = "../../fastclaw-core" }
fastclaw-protocol = { path = "../../fastclaw-protocol" }
fastclaw-gateway = { path = "../../fastclaw-gateway" }
fastclaw-agent = { path = "../../fastclaw-agent" }
fastclaw-cron = { path = "../../fastclaw-cron" }
fastclaw-observe = { path = "../../fastclaw-observe" }
fastclaw-security = { path = "../../fastclaw-security" }
tauri-plugin-dialog = "2"
tauri-plugin-mcp-bridge = "0.11"
fix-path-env = { git = "https://github.com/tauri-apps/fix-path-env-rs" }
zip = { version = "8.5.1", default-features = false, features = ["deflate"] }
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
base64 = "0.22"

[dev-dependencies]
fastclaw-gateway = { path = "../../fastclaw-gateway", features = ["test-helpers"] }
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
async-trait = "0.1"
futures = "0.3"

[target.'cfg(any(target_os = "macos", windows, target_os = "linux"))'.dependencies]
tauri-plugin-autostart = "2.5.1"
