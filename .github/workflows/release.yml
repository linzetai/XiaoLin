name: Release

# 面向终端用户：推送 v* 标签时构建并发布 FastClaw 桌面端（Tauri / fastclaw-app）。
# - Linux: .deb
# - macOS: .dmg（universal-apple-darwin）
# - Windows: NSIS .exe 安装包

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-app:
    name: FastClaw App (${{ matrix.id }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            os: ubuntu-latest
            bundle_cp_bash: |
              mkdir -p upload
              cp target/release/bundle/deb/*.deb upload/
          - id: macos-universal
            os: macos-latest
            bundle_cp_bash: |
              mkdir -p upload
              cp target/universal-apple-darwin/release/bundle/dmg/*.dmg upload/
          - id: windows-x64
            os: windows-latest
            bundle_cp_pwsh: |
              New-Item -ItemType Directory -Force -Path upload | Out-Null
              Copy-Item "target/release/bundle/nsis/*.exe" upload/
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: crates/fastclaw-app/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS universal)
        if: matrix.id == 'macos-universal'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies (Tauri + OpenSSL)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: crates/fastclaw-app
        run: pnpm install --frozen-lockfile

      - name: Bundle rust-analyzer for host
        working-directory: crates/fastclaw-app
        shell: bash
        run: |
          HOST_TARGET="$(rustc -Vv | awk '/host:/ {print $2}')"
          bash ../../.github/scripts/fetch-rust-analyzer.sh \
            "${HOST_TARGET}" \
            "src-tauri/resources/lsp"

      - name: Build Tauri installers
        working-directory: crates/fastclaw-app
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.id }}" = "macos-universal" ]; then
            pnpm exec -- tauri build --target universal-apple-darwin --bundles dmg
          else
            pnpm exec -- tauri build
          fi

      - name: Stage installer artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ${{ matrix.bundle_cp_bash }}
          ls -la upload

      - name: Stage installer artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ${{ matrix.bundle_cp_pwsh }}
          Get-ChildItem upload

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastclaw-app-${{ matrix.id }}
          path: upload/
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten and checksum
        run: |
          set -euo pipefail
          cd dist
          find . -type f \( -name '*.deb' -o -name '*.dmg' -o -name '*.exe' \) -print0 | while IFS= read -r -d '' f; do
            base="$(basename "$f")"
            cp "$f" "./${base}"
          done
          find . -mindepth 1 -type d -exec rm -rf {} +
          shopt -s nullglob
          sums=( *.deb *.dmg *.exe )
          if [ ${#sums[@]} -eq 0 ]; then
            echo "No installers found" >&2
            exit 1
          fi
          sha256sum "${sums[@]}" > checksums-sha256.txt
          cat checksums-sha256.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.dmg
            dist/*.exe
            dist/checksums-sha256.txt

  publish-docker:
    name: Publish Docker Image (fastclaw CLI)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
