name: Release

on:
  push:
    tags:
      - "v*"

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: crates/fastclaw-app/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/fastclaw-app/src-tauri

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev || \
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          sudo apt-get install -y \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Add Rust targets (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Install frontend deps
        working-directory: crates/fastclaw-app
        run: pnpm install --frozen-lockfile

      - name: Clippy (release)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build frontend
        working-directory: crates/fastclaw-app
        run: pnpm build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build CLI (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          cargo build --release --package fastclaw-cli
          VERSION="${GITHUB_REF_NAME#v}"
          # Place in src-tauri/binaries for deb packaging
          mkdir -p crates/fastclaw-app/src-tauri/binaries
          cp target/release/fastclaw crates/fastclaw-app/src-tauri/binaries/fastclaw
          chmod +x crates/fastclaw-app/src-tauri/binaries/fastclaw
          # Also create standalone archive
          mkdir -p cli-out
          cp target/release/fastclaw cli-out/
          cd cli-out && tar czf "fastclaw-cli-${VERSION}-linux-x86_64.tar.gz" fastclaw

      - name: Build CLI (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          cargo build --release --package fastclaw-cli --target aarch64-apple-darwin
          cargo build --release --package fastclaw-cli --target x86_64-apple-darwin
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p cli-out
          lipo -create \
            target/aarch64-apple-darwin/release/fastclaw \
            target/x86_64-apple-darwin/release/fastclaw \
            -output cli-out/fastclaw
          cd cli-out && tar czf "fastclaw-cli-${VERSION}-darwin-universal.tar.gz" fastclaw

      - name: Build CLI (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cargo build --release --package fastclaw-cli
          $Version = "$env:GITHUB_REF_NAME" -replace "^v", ""
          New-Item -ItemType Directory -Force -Path cli-out
          Copy-Item target\release\fastclaw.exe cli-out\
          Push-Location cli-out
          Compress-Archive -Path fastclaw.exe -DestinationPath "fastclaw-cli-${Version}-windows-x86_64.zip"
          Pop-Location

      - name: Build Tauri App
        working-directory: crates/fastclaw-app
        run: pnpm exec -- tauri build ${{ matrix.args }}

      - name: Collect artifacts (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p upload
          for dir in target/release/bundle target/*/release/bundle target/tauri/release/bundle; do
            [ -d "$dir" ] || continue
            find "$dir" -type f \( \
              -name "*.AppImage" -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" \
              -o -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
              -o -name "*.deb" \
            \) -exec cp {} upload/ \;
          done
          # Add CLI archive
          cp cli-out/fastclaw-cli-*.tar.gz upload/ 2>/dev/null || true
          ls -la upload/

      - name: Collect artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path upload
          $dirs = @("target\release\bundle", "target\tauri\release\bundle")
          $dirs += Get-ChildItem -Path target -Directory | ForEach-Object { Join-Path $_.FullName "release\bundle" }
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Get-ChildItem -Recurse $d -Include *.exe,*.msi,*.nsis.zip,*.nsis.zip.sig | Copy-Item -Destination upload
            }
          }
          # Add CLI archive
          Copy-Item cli-out\fastclaw-cli-*.zip upload\ -ErrorAction SilentlyContinue
          Get-ChildItem upload

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.platform }}
          path: upload/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist/

      - name: Generate latest.json for updater
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${GITHUB_REPOSITORY}"
          BASE_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signatures if they exist
          LINUX_SIG=""
          WINDOWS_SIG=""
          MACOS_SIG=""
          for f in dist/*.AppImage.tar.gz.sig; do [ -f "$f" ] && LINUX_SIG=$(cat "$f"); done
          for f in dist/*.nsis.zip.sig; do [ -f "$f" ] && WINDOWS_SIG=$(cat "$f"); done
          for f in dist/*.app.tar.gz.sig; do [ -f "$f" ] && MACOS_SIG=$(cat "$f"); done

          # Find artifact filenames
          LINUX_FILE=$(cd dist && ls *.AppImage.tar.gz 2>/dev/null | head -1 || true)
          WINDOWS_FILE=$(cd dist && ls *.nsis.zip 2>/dev/null | head -1 || true)
          MACOS_FILE=$(cd dist && ls *.app.tar.gz 2>/dev/null | head -1 || true)

          # Build platforms JSON
          PLATFORMS="{"
          FIRST=true
          if [ -n "$LINUX_FILE" ] && [ -n "$LINUX_SIG" ]; then
            PLATFORMS="$PLATFORMS\"linux-x86_64\":{\"url\":\"${BASE_URL}/${LINUX_FILE}\",\"signature\":\"${LINUX_SIG}\"}"
            FIRST=false
          fi
          if [ -n "$WINDOWS_FILE" ] && [ -n "$WINDOWS_SIG" ]; then
            [ "$FIRST" = false ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="$PLATFORMS\"windows-x86_64\":{\"url\":\"${BASE_URL}/${WINDOWS_FILE}\",\"signature\":\"${WINDOWS_SIG}\"}"
            FIRST=false
          fi
          if [ -n "$MACOS_FILE" ] && [ -n "$MACOS_SIG" ]; then
            [ "$FIRST" = false ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="$PLATFORMS\"darwin-universal\":{\"url\":\"${BASE_URL}/${MACOS_FILE}\",\"signature\":\"${MACOS_SIG}\"}"
          fi
          PLATFORMS="$PLATFORMS}"

          cat > dist/latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "FastClaw v${VERSION}",
            "pub_date": "${DATE}",
            "platforms": ${PLATFORMS}
          }
          EOF

          echo "=== latest.json ==="
          cat dist/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
