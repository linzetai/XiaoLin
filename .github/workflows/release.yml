name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 先安装 pnpm（修复 cache 问题）
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ✅ 再 setup node + cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: crates/fastclaw-app/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ✅ Rust cache（支持 workspace）
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/fastclaw-app/src-tauri

      # ✅ Linux 依赖修复
      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev || \
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          sudo apt-get install -y \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ✅ macOS universal 构建需要两个 target
      - name: Add Rust targets (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      # ✅ 安装前端依赖
      - name: Install frontend deps
        working-directory: crates/fastclaw-app
        run: pnpm install --frozen-lockfile

      # ✅ 构建前端
      - name: Build frontend
        working-directory: crates/fastclaw-app
        run: pnpm build

      # ✅ 安装 Tauri CLI（更稳）
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      # ✅ 构建 Tauri（修复 macOS bundle 问题）
      - name: Build Tauri App
        working-directory: crates/fastclaw-app
        run: pnpm exec -- tauri build ${{ matrix.args }}

      # ✅ 收集产物（跨平台）
      # When --target is used (e.g. universal-apple-darwin), bundles go to
      # target/<triple>/release/bundle instead of target/release/bundle.
      - name: Collect artifacts (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p upload
          for dir in target/release/bundle target/*/release/bundle; do
            [ -d "$dir" ] && find "$dir" -type f \( -name "*.AppImage" -o -name "*.dmg" -o -name "*.deb" \) -exec cp {} upload/ \;
          done
          ls -la upload/

      - name: Collect artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path upload
          $dirs = @("target\release\bundle")
          $dirs += Get-ChildItem -Path target -Directory | ForEach-Object { Join-Path $_.FullName "release\bundle" }
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Get-ChildItem -Recurse $d -Include *.exe,*.msi | Copy-Item -Destination upload
            }
          }
          Get-ChildItem upload

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.platform }}
          path: upload/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ✅ 防止文件名冲突
      - name: Flatten artifacts
        run: |
          mkdir dist
          find artifacts -type f | while read f; do
            base=$(basename "$f")
            new_name="$(echo "$f" | tr '/' '_')_${base}"
            cp "$f" "dist/$new_name"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}