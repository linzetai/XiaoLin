name: Tauri Release

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build Tauri (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
          - platform: macos-latest
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: crates/fastclaw-app/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: crates/fastclaw-app
        run: pnpm install --frozen-lockfile

      - name: Bundle rust-analyzer for current platform
        working-directory: crates/fastclaw-app
        run: |
          HOST_TARGET="$(rustc -Vv | awk '/host:/ {print $2}')"
          bash ../../.github/scripts/fetch-rust-analyzer.sh \
            "${HOST_TARGET}" \
            "src-tauri/resources/lsp"
        shell: bash

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/fastclaw-app
          tagName: app-v__VERSION__
          releaseName: "FastClaw App v__VERSION__"
          releaseBody: "Automated Tauri release with bundled rust-analyzer."
          releaseDraft: true
          prerelease: false
