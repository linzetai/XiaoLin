name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --workspace --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --workspace --target ${{ matrix.target }}

  build:
    name: Build (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fastclaw
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: fastclaw
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: fastclaw
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: fastclaw
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fastclaw.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --bin fastclaw --target ${{ matrix.target }}
          else
            cargo build --release --bin fastclaw --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Fetch bundled rust-analyzer
        run: |
          bash .github/scripts/fetch-rust-analyzer.sh \
            "${{ matrix.target }}" \
            "target/${{ matrix.target }}/release/lsp"
        shell: bash

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastclaw-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.artifact }}
            target/${{ matrix.target }}/release/lsp/*
          if-no-files-found: error
