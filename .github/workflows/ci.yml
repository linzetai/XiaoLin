name: CI

on:
  push:
    branches: [main]
    paths:
      - "crates/fastclaw-app/**"
      - ".github/workflows/**"
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # node + cache
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crates/fastclaw-app/pnpm-lock.yaml

      # rust
      - uses: dtolnay/rust-toolchain@stable

      # rust cache
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/fastclaw-app/src-tauri

      # install deps
      - name: Install deps
        working-directory: crates/fastclaw-app
        run: pnpm install --frozen-lockfile

      # 前端构建（验证）
      - name: Build frontend
        working-directory: crates/fastclaw-app
        run: pnpm build

      # Rust 只做 check（快很多）
      - name: Cargo check
        working-directory: crates/fastclaw-app/src-tauri
        run: cargo check