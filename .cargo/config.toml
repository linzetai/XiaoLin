# Workspace-wide Cargo configuration.

# Use mold linker for significantly faster linking on Linux.
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[env]
TS_RS_EXPORT_DIR = { value = "crates/fastclaw-protocol/generated", relative = true }

# Uncomment to enable sccache for faster incremental builds:
# [build]
# rustc-wrapper = "sccache"
